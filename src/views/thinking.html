<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* 主卡片 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 480px;
            width: 90%;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.2);
        }

        /* 图标 */
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* 标题 */
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }

        /* 按钮 */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            border-radius: 50px;
            transition: opacity 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-icon {
            font-size: 18px;
        }

        /* 结果区域 */
        .result {
            margin-top: 28px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 思考状态卡片 */
        .thinking-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            border-radius: 16px;
            border: 1px solid rgba(102, 126, 234, 0.15);
            animation: fadeInUp 0.4s ease;
        }

        .thinking-label {
            font-size: 15px;
            color: #555;
            font-weight: 500;
        }

        /* 跳动的点 */
        .dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* 答案状态卡片 */
        .answer-box {
            padding: 16px 24px;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            border-radius: 16px;
            border: 1px solid rgba(76, 175, 80, 0.15);
            animation: fadeInUp 0.4s ease;
        }

        .answer-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .answer-text {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
        }

        /* 淡入上滑动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🤖</div>
        <div class="title">AI 智能问答</div>
        <div class="subtitle">点击按钮，向 AI 提问</div>

        <button class="btn" onclick="askAI()">
            <span class="btn-icon">✨</span>
            问 AI 一个问题
        </button>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function askAI() {
            const resultDiv = document.getElementById('result');
            const btn = document.querySelector('.btn');

            // 禁用按钮防止重复点击
            btn.disabled = true;

            // 显示思考状态
            resultDiv.innerHTML = `
                <div class="thinking-box">
                    <span class="thinking-label">AI 正在思考中</span>
                    <span class="dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </span>
                </div>
            `;

            // 模拟 AI 思考 2 秒
            await new Promise(resolve => setTimeout(resolve, 2000));

            // 显示答案
            resultDiv.innerHTML = `
                <div class="answer-box">
                    <div class="answer-label">AI 回复</div>
                    <div class="answer-text">前端真有意思！🚀</div>
                </div>
            `;

            // 恢复按钮
            btn.disabled = false;
        }
    </script>
</body>
</html>
